<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#FFFDE7" rx="12"/>
  
  <!-- oil can -->
  <rect x="60" y="55" width="80" height="90" rx="6" fill="#F0F4C3" stroke="#827717" stroke-width="2"/>
  <rect x="75" y="40" width="50" height="20" rx="4" fill="#E6EE9C" stroke="#827717" stroke-width="1.5"/>
