<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#E3F2FD" rx="12"/>
  
  <!-- pole -->
  <rect x="97" y="90" width="6" height="70" fill="#90CAF9" stroke="#0D47A1" stroke-width="1"/>
  <!-- cross arm -->
  <line x1="55" y1="70" x2="145" y2="70" stroke="#0D47A1" stroke-width="2"/>
  <!-- cups -->
  <path d="M50,62 A8,8 0 0,1 50,78" fill="#64B5F6" stroke="#0D47A1" stroke-width="1.5"/>
  <path d="M100,62 A8,8 0 0,1 100,78" fill="#64B5F6" stroke="#0D47A1" stroke-width="1.5"/>
  <path d="M150,62 A8,8 0 0,1 150,78" fill="#64B5F6" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- wind direction vane -->
  <polygon points="90,45 100,35 110,45 100,42" fill="#42A5F5" stroke="#0D47A1" stroke-width="1"/>
  <line x1="100" y1="42" x2="100" y2="58" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- wind arrows -->
  <text x="30" y="50" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">→</text>
  <text x="22" y="65" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">→</text>

  <text x="100" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1">Anemometer</text>

</svg>