<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#E8EAF6" rx="12"/>
  <!-- stator housing -->
  <ellipse cx="100" cy="100" rx="55" ry="50" fill="#C5CAE9" stroke="#283593" stroke-width="2"/>
  <!-- stator windings -->
  <ellipse cx="100" cy="100" rx="45" ry="40" fill="none" stroke="#3F51B5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- rotor -->
  <ellipse cx="100" cy="100" rx="30" ry="28" fill="#9FA8DA" stroke="#283593" stroke-width="1.5"/>
  <!-- shaft -->
  <rect x="10" y="95" width="40" height="10" rx="2" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
  <rect x="150" y="97" width="35" height="6" rx="2" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
  <!-- coil symbols -->
  <path d="M80,85 Q85,80 90,85 Q95,90 100,85" fill="none" stroke="#1A237E" stroke-width="1.5"/>
  <path d="M80,110 Q85,105 90,110 Q95,115 100,110" fill="none" stroke="#1A237E" stroke-width="1.5"/>
  <!-- center point -->
  <circle cx="100" cy="100" r="5" fill="#283593"/>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#283593">Generator Assembly</text>

</svg>