<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#E8F5E9" rx="12"/>
  <!-- single blade profile -->
  <path d="M30,170 Q35,100 50,60 Q65,30 80,20 Q90,16 95,18 Q100,22 98,30 Q95,50 85,80 Q75,110 60,140 Q50,160 40,170 Z" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- cross section lines -->
  <line x1="45" y1="130" x2="55" y2="130" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="55" y1="100" x2="70" y2="100" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="65" y1="70" x2="80" y2="70" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- spar cap indication -->
  <line x1="55" y1="165" x2="90" y2="22" stroke="#1B5E20" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- dimension -->
  <text x="130" y="90" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">75 m</text>
  <line x1="120" y1="25" x2="120" y2="165" stroke="#2E7D32" stroke-width="0.8" marker-start="url(#arrowS)" marker-end="url(#arrowE)"/>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">Blade Set</text>

</svg>