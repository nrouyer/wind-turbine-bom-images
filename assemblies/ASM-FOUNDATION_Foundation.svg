<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#EFEBE9" rx="12"/>
  <!-- ground level -->
  <line x1="10" y1="100" x2="190" y2="100" stroke="#5D4037" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="170" y="96" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">GL</text>
  <!-- foundation block -->
  <polygon points="30,100 170,100 160,160 40,160" fill="#BCAAA4" stroke="#5D4037" stroke-width="2"/>
  <!-- rebar pattern -->
  <line x1="50" y1="110" x2="150" y2="110" stroke="#8D6E63" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="55" y1="125" x2="145" y2="125" stroke="#8D6E63" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="60" y1="140" x2="140" y2="140" stroke="#8D6E63" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="70" y1="105" x2="70" y2="155" stroke="#8D6E63" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="100" y1="105" x2="100" y2="155" stroke="#8D6E63" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="130" y1="105" x2="130" y2="155" stroke="#8D6E63" stroke-width="1" stroke-dasharray="2,4"/>
  <!-- anchor bolts -->
  <rect x="80" y="80" width="40" height="22" fill="#A1887F" stroke="#5D4037" stroke-width="1"/>
  <line x1="85" y1="80" x2="85" y2="70" stroke="#5D4037" stroke-width="2"/>
  <line x1="95" y1="80" x2="95" y2="70" stroke="#5D4037" stroke-width="2"/>
  <line x1="105" y1="80" x2="105" y2="70" stroke="#5D4037" stroke-width="2"/>
  <line x1="115" y1="80" x2="115" y2="70" stroke="#5D4037" stroke-width="2"/>
  <!-- tower stub -->
  <polygon points="88,80 112,80 110,55 90,55" fill="#CFD8DC" stroke="#78909C" stroke-width="1"/>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#5D4037">Foundation</text>

</svg>