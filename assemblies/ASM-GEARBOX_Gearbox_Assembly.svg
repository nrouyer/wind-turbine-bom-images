<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#EFEBE9" rx="12"/>
  <!-- gearbox housing -->
  <rect x="35" y="50" width="130" height="95" rx="8" fill="#D7CCC8" stroke="#5D4037" stroke-width="2"/>
  <!-- input shaft -->
  <rect x="10" y="88" width="30" height="12" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- output shaft -->
  <rect x="160" y="92" width="30" height="8" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- gear 1 (large - planetary) -->
  <circle cx="75" cy="95" r="28" fill="none" stroke="#5D4037" stroke-width="2"/>
  <circle cx="75" cy="95" r="22" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <circle cx="75" cy="95" r="8" fill="#8D6E63"/>
  <!-- gear teeth indication -->
  <circle cx="75" cy="95" r="28" fill="none" stroke="#5D4037" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- gear 2 (small - helical) -->
  <circle cx="130" cy="95" r="16" fill="none" stroke="#5D4037" stroke-width="2"/>
  <circle cx="130" cy="95" r="12" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <circle cx="130" cy="95" r="5" fill="#8D6E63"/>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#5D4037">Gearbox Assembly</text>

</svg>