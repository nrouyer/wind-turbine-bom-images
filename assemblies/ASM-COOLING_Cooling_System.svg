<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">


  <rect width="200" height="200" fill="#E0F2F1" rx="12"/>
  <!-- radiator -->
  <rect x="50" y="50" width="100" height="80" rx="5" fill="#B2DFDB" stroke="#004D40" stroke-width="2"/>
  <!-- fins -->
  <line x1="60" y1="55" x2="60" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <line x1="72" y1="55" x2="72" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <line x1="84" y1="55" x2="84" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <line x1="96" y1="55" x2="96" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <line x1="108" y1="55" x2="108" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <line x1="120" y1="55" x2="120" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <line x1="132" y1="55" x2="132" y2="125" stroke="#00897B" stroke-width="1.5"/>
  <!-- fan -->
  <circle cx="100" cy="90" r="20" fill="#80CBC4" stroke="#004D40" stroke-width="1.5"/>
  <circle cx="100" cy="90" r="5" fill="#004D40"/>
  <line x1="100" y1="72" x2="100" y2="75" stroke="#004D40" stroke-width="2"/>
  <line x1="100" y1="105" x2="100" y2="108" stroke="#004D40" stroke-width="2"/>
  <line x1="82" y1="90" x2="85" y2="90" stroke="#004D40" stroke-width="2"/>
  <line x1="115" y1="90" x2="118" y2="90" stroke="#004D40" stroke-width="2"/>
  <!-- pipes -->
  <path d="M50,70 L30,70 L30,140 L100,140" fill="none" stroke="#00695C" stroke-width="3" stroke-linecap="round"/>
  <path d="M150,70 L170,70 L170,140 L100,140" fill="none" stroke="#00695C" stroke-width="3" stroke-linecap="round"/>
  <!-- flow arrows -->
  <polygon points="35,100 30,95 25,100" fill="#00695C"/>
  <polygon points="165,100 170,105 175,100" fill="#00695C"/>
  <text x="100" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#004D40">Cooling System</text>

</svg>